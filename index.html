<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball Style Points Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050a14; font-family: 'Rajdhani', sans-serif; overflow: hidden; }
        .deep-blue-bg { background: linear-gradient(135deg, #0f172a 0%, #020617 100%); }
        .modern-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid rgba(251, 191, 36, 0.2);
            transition: all 0.3s ease;
        }
        .modern-card:hover { border-color: rgba(251, 191, 36, 0.6); box-shadow: 0 0 20px rgba(251, 191, 36, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="w-full h-screen">

    <div class="w-full h-screen flex flex-col overflow-hidden">
        
        <!-- Header -->
        <div id="header-area" class="deep-blue-bg p-6 pb-4 flex-shrink-0 border-b border-yellow-500/20">
            <h1 id="page-title" class="text-2xl font-bold text-amber-400 uppercase tracking-widest">THE ONE COIN STORE</h1>
            
            <div class="flex gap-2 mt-4 mb-2">
                <button onclick="renderPage('leaderboard')" id="btn-leaderboard" class="flex-1 py-2 bg-yellow-500/20 text-amber-400 rounded-lg text-xs font-bold uppercase tracking-widest transition border border-yellow-500/50">STORE</button>
                <button onclick="renderPage('wallet')" id="btn-wallet" class="flex-1 py-2 bg-white/5 text-gray-400 rounded-lg text-xs font-bold uppercase tracking-widest transition hover:bg-white/10">WALLET</button>
                <button onclick="renderPage('rules')" id="btn-rules" class="flex-1 py-2 bg-white/5 text-gray-400 rounded-lg text-xs font-bold uppercase tracking-widest transition hover:bg-white/10">RULES</button>
            </div>

            <div id="search-box" class="relative w-full mt-2">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-yellow-500/50"></i>
                <input type="text" id="search-bar" placeholder="SEARCH PLAYER..." 
                       class="w-full bg-white/5 text-white rounded-xl py-3 pl-12 pr-4 placeholder-yellow-500/30 outline-none border border-yellow-500/20 focus:border-yellow-400 transition-all uppercase tracking-widest text-sm">
            </div>
        </div>

        <div id="content-area" class="p-6 space-y-4 overflow-y-auto flex-1 scrollbar-hide">
        </div>
    </div>

    <script>
        const players = [
            { name: "Owen", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Kyaw" },
            { name: "Min Nyi", points: "70 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Aung" },
            { name: "Kaung Kaung", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Mg" },
            { name: "Arkar", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Mon Naung", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Hla" },
            { name: "PSTW", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Kevin", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Min Xtet Txurâ", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Μæï Măī", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Cry", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "❈ 𝐀𝐬𝐡𝐞𝐫 𝐎𝐟𝐟𝐢𝐜𝐢𝐚𝐥 ☾", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "San Tun Aung", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "La Minn 33", points: "40 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Mg" },
            { name: "Yatt Kha", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Hla" },
            { name: "Sai Mon Aon", points: "50 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "Sho", points: "20 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Su" },
            { name: "O", points: "50 PTS", img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Mg" },
            
        ];

        const walletItems = [
            { pts: "300 Points", coin: "130 COINS", link: "https://t.me/Profit_Zio" },
            { pts: "500 Points", coin: "300 COINS", link: "https://t.me/Profit_Zio" },
            { pts: "800 Points", coin: "550 COINS", link: "https://t.me/Profit_Zio" },
            { pts: "1250 Points", coin: "750 COINS", link: "https://t.me/Profit_Zio" },
            { pts: "1600 Points", coin: "1040 COINS", link: "https://t.me/Profit_Zio" }
        ];

        document.getElementById('search-bar').addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredPlayers = players.filter(p => p.name.toLowerCase().includes(searchTerm));
            renderLeaderboard(filteredPlayers);
        });

        function setActiveButton(type) {
            const btns = ['leaderboard', 'wallet', 'rules'];
            btns.forEach(id => {
                const btn = document.getElementById(`btn-${id}`);
                if (id === type) {
                    btn.className = "flex-1 py-2 bg-yellow-500/20 text-amber-400 rounded-lg text-xs font-bold uppercase tracking-widest transition border border-yellow-500/50";
                } else {
                    btn.className = "flex-1 py-2 bg-white/5 text-gray-400 rounded-lg text-xs font-bold uppercase tracking-widest transition hover:bg-white/10";
                }
            });
        }

        function renderLeaderboard(playerList) {
            const container = document.getElementById('content-area');
            container.innerHTML = "";
            playerList.forEach(p => {
                container.innerHTML += `
                    <div class="flex items-center justify-between bg-[#0f172a] p-4 rounded-xl border border-yellow-500/10">
                        <div class="flex items-center gap-4">
                            <img src="${p.img}" class="w-10 h-10 rounded-lg bg-yellow-500/10 p-1">
                            <h3 class="text-white font-semibold text-md uppercase tracking-wider">${p.name}</h3>
                        </div>
                        <span class="text-amber-400 font-bold text-lg">${p.points}</span>
                    </div>
                `;
            });
        }

        function renderPage(type) {
            const container = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            const searchBox = document.getElementById('search-box');
            
            container.innerHTML = "";
            searchBox.style.display = (type === 'leaderboard') ? 'block' : 'none';
            setActiveButton(type);
            
            if (type === 'leaderboard') {
                title.innerText = "THE ONE COIN STORE";
                renderLeaderboard(players);
            } else if (type === 'wallet') {
                title.innerText = "EXCHANGE";
                walletItems.forEach(item => {
                    container.innerHTML += `
                        <div class="modern-card p-5 flex flex-col gap-4">
                            <div class="flex justify-between items-center">
                                <span class="text-white font-bold text-xl tracking-widest">${item.pts}</span>
                                <span class="text-yellow-500 text-[10px] font-bold border border-yellow-500/30 px-2 py-1 rounded">EXCHANGE</span>
                            </div>
                            <div class="flex justify-between items-center border-t border-white/5 pt-4">
                                <span class="text-amber-400 font-bold text-lg"><i class="fa-solid fa-coins"></i> ${item.coin}</span>
                                <a href="${item.link}" target="_blank" class="bg-amber-500 text-black font-bold py-2 px-5 rounded-lg text-[10px] uppercase hover:bg-amber-400 transition">လဲလှယ်ရန်</a>
                            </div>
                        </div>
                    `;
                });
            } else {
                title.innerText = "RULES";
                container.innerHTML = `
                    <div class="modern-card p-6 space-y-4">
                        <div class="border-b border-white/5 pb-4"><h3 class="text-white font-bold uppercase">Buy 1 Item</h3><p class="text-amber-400 font-bold text-xl">+20 Points</p></div>
                        <div><h3 class="text-white font-bold uppercase">Buy 1 Item & More</h3><p class="text-amber-400 font-bold text-xl">+50 Points</p></div>
                    </div>
                `;
            }
        }
        renderPage('leaderboard');
    </script>
</body>
</html>
